name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck -s sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck install.sh + uninstall.sh
        run: |
          shellcheck --version
          shellcheck -s sh install.sh uninstall.sh

  syntax:
    name: sh -n syntax smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: sh -n (BusyBox-compatible)
        # dash is the closest POSIX-strict shell available on GH runners.
        # Matches the target: OpenWrt ash via BusyBox.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends dash
          dash -n install.sh
          dash -n uninstall.sh
          sh -n install.sh
          sh -n uninstall.sh

  unit-tests:
    name: install.sh unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install dash (POSIX-strict reference)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends dash
      - name: tests/test_vless_url.sh — VLESS URL parser fixtures
        run: |
          sh   tests/test_vless_url.sh
          dash tests/test_vless_url.sh
      - name: tests/test_urldecode.sh — _urldecode() unit tests
        run: |
          sh   tests/test_urldecode.sh
          dash tests/test_urldecode.sh
      - name: tests/test_state_file.sh — idempotency state-file
        run: |
          sh   tests/test_state_file.sh
          dash tests/test_state_file.sh
      - name: tests/test_parse_args.sh — CLI flag parsing
        run: |
          sh   tests/test_parse_args.sh
          dash tests/test_parse_args.sh
